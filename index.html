<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 자막</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      user-select: none;
    }

    #caption-area {
      width: 100%;
      max-width: 960px;
      padding: 40px 48px 120px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 24px;
    }

    /* 이전 문장: 작고 흐리게 */
    .line-prev {
      font-size: 36px;
      font-weight: 500;
      line-height: 1.4;
      color: #bbb;
      min-height: 1.4em;
      transition: color 0.3s;
      word-break: keep-all;
    }

    /* 구분선 */
    .divider {
      width: 48px;
      height: 3px;
      background: #e0e0e0;
      border-radius: 2px;
    }

    /* 현재 문장: 크고 진하게 */
    .line-current {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.35;
      color: #111;
      min-height: 1.35em;
      word-break: keep-all;
    }

    /* 인식 중 (회색 이탤릭) */
    .interim {
      color: #aaa;
      font-weight: 600;
    }

    #status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      background: rgba(255,255,255,0.97);
      border-top: 1px solid #eee;
    }

    #mic-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: #1a1a1a;
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }

    #mic-btn:active { transform: scale(0.93); }
    #mic-btn.listening { background: #e53935; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.4); }
      50%       { box-shadow: 0 0 0 10px rgba(229, 57, 53, 0); }
    }

    #status-text { font-size: 15px; color: #666; }

    #clear-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 14px;
      color: #888;
      cursor: pointer;
    }
    #clear-btn:hover { background: #f5f5f5; }

    #beta-badge {
      position: fixed;
      top: 16px;
      right: 20px;
      background: #f0f0f0;
      color: #999;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
    }

    #no-support {
      display: none;
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div id="beta-badge">베타 테스트</div>

  <div id="caption-area">
    <div class="line-prev" id="prev-line"></div>
    <div class="divider" id="divider" style="display:none"></div>
    <div class="line-current" id="curr-line"></div>
  </div>

  <div id="status-bar">
    <button id="mic-btn" title="마이크 시작/정지">🎤</button>
    <span id="status-text">마이크 버튼을 눌러 시작하세요</span>
    <button id="clear-btn">지우기</button>
  </div>

  <div id="no-support">
    이 브라우저는 음성 인식을 지원하지 않습니다.<br>
    Chrome 브라우저를 사용해주세요.
  </div>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      document.querySelector('#caption-area').style.display = 'none';
      document.querySelector('#status-bar').style.display = 'none';
      document.querySelector('#no-support').style.display = 'block';
    } else {
      const recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 3;

      const prevEl   = document.getElementById('prev-line');
      const currEl   = document.getElementById('curr-line');
      const divider  = document.getElementById('divider');
      const micBtn   = document.getElementById('mic-btn');
      const statusTx = document.getElementById('status-text');
      const clearBtn = document.getElementById('clear-btn');

      let isListening = false;
      let prevText    = '';   // 이전 문장 (확정)
      let currText    = '';   // 현재 문장 (확정 누적)
      let silenceTimer = null;

      // maxAlternatives 중 신뢰도 가장 높은 후보
      function getBest(result) {
        let best = result[0];
        for (let i = 1; i < result.length; i++) {
          if (result[i].confidence > best.confidence) best = result[i];
        }
        return best.transcript.trim();
      }

      function updateDisplay(interim = '') {
        prevEl.textContent  = prevText;
        divider.style.display = prevText ? 'block' : 'none';
        currEl.innerHTML = currText
          + (interim ? `<span class="interim"> ${interim}</span>` : '');
      }

      // isFinal 결과가 올 때마다 = 문장 1개 완성 → 줄바꿈
      function commitSentence(text) {
        if (!text) return;
        prevText = currText;   // 이전 줄로 밀기
        currText = text;       // 새 문장 시작
        updateDisplay();
      }

      recognition.onresult = (event) => {
        let interim = '';

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const r = event.results[i];
          if (r.isFinal) {
            // 확정된 문장 → 무조건 새 줄
            commitSentence(getBest(r));
          } else {
            interim += r[0].transcript;
          }
        }

        updateDisplay(interim);
      };

      // 침묵 2초 후 현재 문장 확정
      recognition.onspeechend = () => {
        silenceTimer = setTimeout(() => {
          if (currText) {
            prevText = currText;
            currText = '';
            updateDisplay();
          }
        }, 2000);
      };
      recognition.onspeechstart = () => clearTimeout(silenceTimer);

      recognition.onerror = (e) => {
        if (e.error === 'not-allowed') {
          statusTx.textContent = '마이크 권한이 필요합니다';
          setListening(false);
        } else if (e.error === 'network') {
          statusTx.textContent = '네트워크 오류 — 재연결 중...';
        } else if (e.error !== 'no-speech' && e.error !== 'aborted') {
          console.warn('인식 오류:', e.error);
        }
      };

      recognition.onend = () => {
        if (isListening) setTimeout(() => { if (isListening) recognition.start(); }, 150);
      };

      function setListening(state) {
        isListening = state;
        micBtn.classList.toggle('listening', state);
        micBtn.textContent = state ? '⏹' : '🎤';
        statusTx.textContent = state ? '듣는 중...' : '마이크 버튼을 눌러 시작하세요';
      }

      micBtn.addEventListener('click', () => {
        if (isListening) { recognition.stop(); setListening(false); }
        else             { recognition.start(); setListening(true); }
      });

      clearBtn.addEventListener('click', () => {
        prevText = ''; currText = '';
        updateDisplay();
      });
    }
  </script>
</body>
</html>
